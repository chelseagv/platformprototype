
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>UX Research Portfolio Prototype</title>
      <script>
        (function () {
          var params = new URLSearchParams(window.location.search);
          var redirect = params.get("redirect");
          if (!redirect) return;

          var base = "%BASE_URL%";
          var normalizedBase = base.endsWith("/") ? base : base + "/";
          var normalizedRoute = redirect.startsWith("/") ? redirect.slice(1) : redirect;
          window.history.replaceState(null, "", normalizedBase + normalizedRoute);
        })();
      </script>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
